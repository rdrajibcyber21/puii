groups:
  - name: puii_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(puii_http_requests_total{status_code=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      # High request latency
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(puii_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is {{ $value }} seconds"

      # Service down
      - alert: ServiceDown
        expr: up{job=~"puii-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute"

      # Database connection issues
      - alert: DatabaseConnectionIssues
        expr: puii_db_queries_total{status="error"} > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection issues"
          description: "High number of database errors detected"

      # ML service errors
      - alert: MLServiceErrors
        expr: rate(puii_ml_service_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML service errors detected"
          description: "ML service error rate is {{ $value }} errors per second"

      # High threat score
      - alert: HighThreatScore
        expr: puii_threat_score_distribution_bucket{le="1.0"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High threat scores detected"
          description: "Large number of high threat scores detected"

      # Low uptime
      - alert: LowUptime
        expr: puii_application_uptime_seconds < 3600
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Application recently restarted"
          description: "Application uptime is {{ $value }} seconds"

