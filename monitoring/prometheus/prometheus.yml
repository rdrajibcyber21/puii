global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'puii-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node.js API Gateway
  - job_name: 'puii-api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'api-gateway'
          component: 'backend'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Python ML Service
  - job_name: 'puii-ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:6000']
        labels:
          service: 'ml-service'
          component: 'backend'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'infrastructure'

